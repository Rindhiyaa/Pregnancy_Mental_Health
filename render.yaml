services:
  # Backend API
  - type: web
    name: ppd-backend-23ni
    env: python
    buildCommand: "./build.sh"
    startCommand: "cd Pregnancy_Mental_Health/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ppd-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://postpartum-risk-insight.onrender.com"

  # Frontend Static Site
  - type: static
    name: postpartum-risk-insight
    env: static
    buildCommand: "cd Pregnancy_Mental_Health/frontend && npm install && npm run build"
    staticPublishPath: "Pregnancy_Mental_Health/frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://ppd-backend-23ni.onrender.com"

databases:
  - name: ppd-db
    plan: free
